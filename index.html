<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flores Amarillas</title>
    <style>
        body {
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; background-color: #000;
            color: #fff; font-family: 'Arial', sans-serif;
            overflow: hidden; text-align: center;
        }

        /* Pétalos cayendo */
        .petal {
            position: fixed; top: -10%; background-color: #ffed00;
            border-radius: 0 50% 0 50%; opacity: 0.8;
            pointer-events: none; animation: fall linear infinite;
        }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }

        .container { z-index: 10; padding: 20px; }
        h1 { font-size: 3rem; color: #ffed00; text-shadow: 0 0 10px #ffed00; }
        .btn {
            background: transparent; color: #ffed00; border: 2px solid #ffed00;
            padding: 15px 30px; font-size: 1.2rem; cursor: pointer;
            border-radius: 50px; transition: 0.3s; text-transform: uppercase;
        }
        .btn:hover { background: #ffed00; color: #000; box-shadow: 0 0 20px #ffed00; }

        #regalo { display: none; }

        /* Las flores amarillas que aparecen con el mensaje */
        .flower-container {
            font-size: 5rem; margin-bottom: 20px;
            animation: grow 1s ease-out;
        }
        @keyframes grow { from { transform: scale(0); } to { transform: scale(1); } }

        .mensaje-final {
            font-size: 1.6rem; color: #ffed00; line-height: 1.5;
            max-width: 800px; margin: 0 auto;
        }
    </style>
</head>
<body>

    <audio id="musica" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <div id="inicio" class="container">
        <p style="letter-spacing: 3px;">FELIZ DÍA DE LAS FLORES AMARILLAS</p>
        <h1>PRECIOSA 🥹</h1>
        <button class="btn" onclick="mostrarRegalo()">VER TU REGALO</button>
    </div>

    <div id="regalo" class="container">
        <div class="flower-container">🌻🌼🌻</div>
        <h2 class="mensaje-final">
            En cada oración, en cada oportunidad <br>
            que tengo de hablar con Dios, sin duda <br>
            suelo mencionar tu nombre. Es algo que <br>
            ya se me ha hecho costumbre y me <br>
            siento feliz 💌 por ello 💞.
        </h2>
    </div>

    <script>
        // Crear pétalos amarillos
        function createPetal() {
            const petal = document.createElement('div');
            petal.classList.add('petal');
            petal.style.left = Math.random() * 100 + 'vw';
            petal.style.width = Math.random() * 15 + 10 + 'px';
            petal.style.height = petal.style.width;
            petal.style.animationDuration = Math.random() * 3 + 2 + 's';
            document.body.appendChild(petal);
            setTimeout(() => { petal.remove(); }, 5000);
        }
        setInterval(createPetal, 200);

        function mostrarRegalo() {
            // Reproducir música al hacer clic
            const audio = document.getElementById('musica');
            audio.play().catch(e => console.log("La música requiere interacción"));
            
            document.getElementById('inicio').style.display = 'none';
            document.getElementById('regalo').style.display = 'block';
        }
    </script>
</body>
</html>
