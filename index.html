<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flores Amarillas</title>
    <style>
        /* ESTILO EXACTO DEL ORIGINAL */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #000;
            color: #fff;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            text-align: center;
        }

        .container {
            z-index: 10;
        }

        h1 {
            font-size: 3rem;
            color: #ffed00;
            text-shadow: 0 0 10px #ffed00;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .btn {
            background: transparent;
            color: #ffed00;
            border: 2px solid #ffed00;
            padding: 10px 20px;
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn:hover {
            background: #ffed00;
            color: #000;
            box-shadow: 0 0 20px #ffed00;
        }

        /* Animación de pétalos (igual al original) */
        .petal {
            position: fixed;
            top: -10%;
            background-color: #ffed00;
            border-radius: 0 50% 0 50%;
            opacity: 0.8;
            pointer-events: none;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to {
                transform: translateY(110vh) rotate(360deg);
            }
        }

        #regalo {
            display: none;
        }

        .mensaje-final {
            font-size: 1.5rem;
            color: #ffed00;
            white-space: pre-line;
            max-width: 90%;
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <div id="inicio" class="container">
        <p>FELIZ DÍA DE LAS FLORES AMARILLAS</p>
        <h1>PRECIOSA 🥹</h1>
        <p>TENGO UN REGALO ESPECIAL PARA TI</p>
        <button class="btn" onclick="mostrarRegalo()">VER TU REGALO</button>
    </div>

    <div id="regalo" class="container">
        <h2 class="mensaje-final">
            En cada oración, en cada oportunidad 
            que tengo de hablar con Dios, sin duda 
            suelo mencionar tu nombre. Es algo que 
            ya se me ha hecho costumbre y me 
            siento feliz 💌 por ello 💞.
        </h2>
    </div>

    <script>
        // Sistema de pétalos del original
        function createPetal() {
            const petal = document.createElement('div');
            petal.classList.add('petal');
            petal.style.left = Math.random() * 100 + 'vw';
            petal.style.width = Math.random() * 15 + 10 + 'px';
            petal.style.height = petal.style.width;
            petal.style.animationDuration = Math.random() * 3 + 2 + 's';
            document.body.appendChild(petal);

            setTimeout(() => {
                petal.remove();
            }, 5000);
        }

        setInterval(createPetal, 200);

        function mostrarRegalo() {
            document.getElementById('inicio').style.display = 'none';
            document.getElementById('regalo').style.display = 'block';
        }
    </script>
</body>
</html>
